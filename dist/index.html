<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/f2a80e826c.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="main.js" defer></script>
    <title>Weather App</title>
  </head>
  <body>
    <main>
      <section class="left__side">
        <img src="#" alt="weathe image" class="weather__image" />
        <div class="left__side__content">
          <div class="degrees">
            <button class="btn btn--cel">C</button>
            <button class="btn btn--far">F</button>
          </div>
          <div class="weather">
            <div class="weather__details">
              <div class="weather__card">
                <div class="card__day">Sunday</div>
                <div class="card__degree">
                  <div class="degree__great">45 C <sup> &#176;</sup></div>
                  <div class="degree__small">30 C <sup> &#176;</sup></div>
                </div>
                <div class="card__weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
              </div>

              <div class="weather__card">
                <div class="card__day">Monday</div>
                <div class="card__degree">
                  <div class="degree__great">45 C <sup> &#176;</sup></div>
                  <div class="degree__small">30 C <sup> &#176;</sup></div>
                </div>
                <div class="card__weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
              </div>

              <div class="weather__card">
                <div class="card__day">Tuesday</div>
                <div class="card__degree">
                  <div class="degree__great">45 C <sup> &#176;</sup></div>
                  <div class="degree__small">30 C <sup> &#176;</sup></div>
                </div>
                <div class="card__weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
              </div>

              <div class="weather__card">
                <div class="card__day">Wednesday</div>
                <div class="card__degree">
                  <div class="degree__great">45 C <sup> &#176;</sup></div>
                  <div class="degree__small">30 C <sup> &#176;</sup></div>
                </div>
                <div class="card__weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
              </div>

              <div class="weather__card">
                <div class="card__day">Thrusday</div>
                <div class="card__degree">
                  <div class="degree__great">45 C <sup> &#176;</sup></div>
                  <div class="degree__small">30 C <sup> &#176;</sup></div>
                </div>
                <div class="card__weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
              </div>

              <div class="weather__card">
                <div class="card__day">Friday</div>
                <div class="card__degree">
                  <div class="degree__great">45 C <sup> &#176;</sup></div>
                  <div class="degree__small">30 C <sup> &#176;</sup></div>
                </div>
                <div class="card__weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
              </div>

              <div class="weather__card">
                <div class="card__day">Saturday</div>
                <div class="card__degree">
                  <div class="degree__great">45 C <sup> &#176;</sup></div>
                  <div class="degree__small">30 C <sup> &#176;</sup></div>
                </div>
                <div class="card__weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
              </div>

              <!------------------------ ----------------------->
            </div>
            <div class="weather__main">
              <div class="weather__temp">
                45 <sup class="degree-symble">&#176;</sup>
              </div>
              <div class="weather__info">
                <div class="weather__city">London</div>
                <div class="weather__date">06:09 - Monday, 9, Sep 2022</div>
              </div>
              <div class="weather__type">
                <div class="weather__type--icon">
                  <i class="fa-solid fa-cloud"></i>
                </div>
                <div class="weather__type--text">Cloudy</div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="right__side">
        <div class="right__side--top">
          <form class="search__form">
            <input type="text" placeholder="City Name" />
            <button type="submit" class="search__btn">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </form>
          <ul class="top__cities">
            <li>Khartoum</li>
            <li>Omderman</li>
            <li>Bahri</li>
            <li>Shandi</li>
          </ul>
        </div>
        <div class="right__side--bottom"></div>
      </section>
    </main>
  </body>
</html>
