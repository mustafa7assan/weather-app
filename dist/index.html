<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="https://openweathermap.org/img/wn/02d@2x.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/f2a80e826c.js"
      crossorigin="anonymous"
      defer
    ></script>
    <style></style>
    <script src="main.js" defer></script>
    <title>Weather App</title>
  </head>
  <body>
    <div class="overlay"></div>
    <main>
      <div class="container">
        <section class="left__side">
          <img src="#" alt="weathe image" class="weather__image" />
          <div class="left__side__content">
            <div class="degrees">
              <button class="btn btn--unit">C</button>
              <button class="btn btn--unit">F</button>
            </div>
            <div class="weather">
              <div class="week__forecast">
                <!------------------------ ----------------------->
              </div>
              <div class="weather__main">
                <div class="weather__temp">
                  <span></span> <sup class="degree-symble">&#176;</sup>
                </div>
                <div class="weather__info">
                  <div class="weather__city"></div>
                  <div class="weather__date"></div>
                </div>
                <div class="weather__type">
                  <div class="weather__type--icon">
                    <img src="#" alt="" />
                  </div>
                  <div class="weather__type--text"></div>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="right__side">
          <div class="right__side--top">
            <form class="search__form">
              <input
                type="text"
                placeholder="City Name"
                class="location__input"
              />
              <button type="submit" class="search__btn">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </form>
            <ul class="top__cities">
              <li>Khartoum</li>
              <li>London</li>
              <li>Ushuaia</li>
              <li>Berlin</li>
            </ul>
          </div>
          <div class="right__side--bottom">
            <h3>Weather Details</h3>
            <ul class="weather__details--list">
              <li>Cloudy <span class="weather__cloude"></span></li>
              <li>Humidity <span class="weather__humidity"></span></li>
              <li>Wind <span class="weather__wind"></span></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
